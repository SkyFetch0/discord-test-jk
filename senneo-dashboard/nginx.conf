server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing — tüm bilinmeyen route'ları index.html'e yönlendir ────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy — tüm backend endpointleri API container'ına proxy ──────────
    location /auth {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /live {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE desteği
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
    location /health {
        proxy_pass http://senneo-api:4000;
    }
    location /messages {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /accounts {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /db {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /alerts {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /metrics {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
    }
    location /errors {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /guilds {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /archive {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /proxies {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /system-stats {
        proxy_pass http://senneo-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Statik dosya cache ────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip sıkıştırma ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;
}
